version: 2

models:
  - name: stg_categories
    description: "Staging de categorias. Renombrado y limpieza basica desde raw_categories."
    columns:
      - name: CATEGORY_ID
        description: "Clave primaria de la categoria. Formato CAT-XXX."
        data_tests:
          - unique
          - not_null
      - name: category_name
        description: "Nombre de la categoria."
        data_tests:
          - not_null
      - name: DESCRIPTION
        description: "Descripcion de la categoria. Nulos reemplazados por 'No description'."

  - name: stg_mechanics
    description: "Staging de mecanicas de juego. Renombrado y limpieza basica desde raw_mechanics."
    columns:
      - name: MECHANIC_ID
        description: "Clave primaria de la mecanica. Formato MEC-XXX."
        data_tests:
          - unique
          - not_null
      - name: MECHANIC_NAME
        description: "Nombre de la mecanica."
        data_tests:
          - not_null
      - name: DESCRIPTION
        description: "Descripcion de la mecanica."

  - name: stg_publishers
    description: "Staging de editoriales. Renombrado y limpieza basica desde raw_publishers."
    columns:
      - name: PUBLISHER_ID
        description: "Clave primaria de la editorial. Formato PUB-XXX."
        data_tests:
          - unique
          - not_null
      - name: NAME
        description: "Nombre de la editorial."
        data_tests:
          - not_null
      - name: COUNTRY
        description: "Codigo de pais ISO 3166-1 alpha-2."
      - name: FOUNDED_YEAR
        description: "Anio de fundacion de la editorial."
      - name: IS_ACTIVE
        description: "Indica si la editorial sigue activa."

  - name: stg_designers
    description: "Staging de disenadores. Renombrado y limpieza basica desde raw_designers."
    columns:
      - name: DESIGNER_ID
        description: "Clave primaria del disenador. Formato DES-XXX."
        data_tests:
          - unique
          - not_null
      - name: NAME
        description: "Nombre del disenador."
        data_tests:
          - not_null
      - name: NATIONALITY
        description: "Codigo de nacionalidad ISO del disenador."
      - name: BIRTH_YEAR
        description: "Anio de nacimiento del disenador."

  - name: stg_games
    description: "Staging de juegos. Renombrado, limpieza de tipos y normalizacion basica desde raw_games."
    columns:
      - name: GAME_ID
        description: "Clave primaria del juego. Formato GAME-XXXX."
        data_tests:
          - unique
          - not_null
      - name: TITLE
        description: "Titulo del juego."
        data_tests:
          - not_null
      - name: YEAR_PUBLISHED
        description: "Anio de publicacion del juego."
      - name: LANGUAGE_DEPENDENCE
        description: "Nivel de dependencia del idioma. Valores: NONE, LOW, ENG."
        data_tests:
          - accepted_values:
              arguments:
                values: ['NONE', 'LOW', 'ENG']
      - name: MIN_PLAYERS
        description: "Numero minimo de jugadores."
      - name: MAX_PLAYERS
        description: "Numero maximo de jugadores."
      - name: MIN_PLAYTIME
        description: "Duracion minima de la partida en minutos."
      - name: MAX_PLAYTIME
        description: "Duracion maxima de la partida en minutos."
      - name: MIN_AGE
        description: "Edad minima recomendada."
      - name: COMPLEXITY_WEIGHT
        description: "Peso de complejidad en escala 1.0-5.0."
      - name: PUBLISHER_ID
        description: "Clave foranea hacia stg_publishers. Puede ser NULL si el juego no tiene editorial asignada en la fuente."
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_publishers')
                field: publisher_id
              config:
                severity: warn
      - name: DESIGNER_ID
        description: "Clave foranea hacia stg_designers. Puede ser NULL si el juego no tiene disenador asignado en la fuente."
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_designers')
                field: designer_id
              config:
                severity: warn
      - name: BGG_RANK
        description: "Ranking del juego en BoardGameGeek."

  - name: stg_game_categories
    description: >
      Staging de relacion N:M entre juegos y categorias desde raw_game_categories.
      NOTA: Algunos GAME_ID aparecen en raw_game_categories pero no en raw_games
      (datos huerfanos desde Bronze). Silver no puede resolver integridad referencial
      sin hacer joins entre tablas, por lo que estos casos se reportan como warning.
    columns:
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
              config:
                severity: warn
      - name: CATEGORY_ID
        description: "Clave foranea hacia stg_categories."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_categories')
                field: category_id
              config:
                severity: warn

  - name: stg_game_mechanics
    description: >
      Staging de relacion N:M entre juegos y mecanicas desde raw_game_mechanics.
      NOTA: Misma situacion que stg_game_categories. Datos huerfanos desde Bronze
      reportados como warning al no poder hacer joins en Silver.
    columns:
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
              config:
                severity: warn
      - name: MECHANIC_ID
        description: "Clave foranea hacia stg_mechanics."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_mechanics')
                field: mechanic_id
              config:
                severity: warn

  - name: stg_users
    description: "Staging de usuarios. Renombrado y limpieza basica desde raw_users."
    columns:
      - name: USER_ID
        description: "Clave primaria del usuario. Formato USR-XXXX."
        data_tests:
          - unique
          - not_null
      - name: USERNAME
        description: "Nombre de usuario."
        data_tests:
          - not_null
      - name: EMAIL
        description: "Direccion de email del usuario. Puede ser NULL si el email de la fuente es invalido."
      - name: COUNTRY
        description: "Codigo de pais ISO 3166-1 alpha-2."
      - name: REGISTRATION_DATE
        description: "Fecha de registro del usuario."
        data_tests:
          - not_null
      - name: USER_TYPE
        description: "Tipo de usuario normalizado a minusculas. Valores: casual, enthusiast, collector."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['casual', 'enthusiast', 'collector']

  - name: stg_reviews_incremental
    description: "Staging de resenias. Incremental por _loaded_at desde raw_reviews."
    columns:
      - name: REVIEW_ID
        description: "Clave primaria de la resenia. Formato REV-XXXXX."
        data_tests:
          - unique
          - not_null
      - name: USER_ID
        description: "Clave foranea hacia stg_users."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
              config:
                severity: warn
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
              config:
                severity: warn
      - name: RATING
        description: "Valoracion numerica del juego en escala 1.0-10.0."        
      - name: REVIEW_TEXT
        description: "Texto de la resenia."
      - name: REVIEW_DATE
        description: "Fecha de publicacion de la resenia."
        data_tests:
          - not_null
      - name: HELPFUL_VOTES
        description: "Numero de votos de utilidad."
      - name: _LOADED_AT
        description: "Timestamp de carga en Bronze. Usado como watermark para la carga incremental."

  - name: stg_collections
    description: "Staging de colecciones. Renombrado, limpieza de status y fechas desde raw_collections."
    columns:
      - name: COLLECTION_ID
        description: "Clave primaria de la entrada de coleccion. Formato COL-XXXXX."
        data_tests:
          - unique
          - not_null
      - name: USER_ID
        description: "Clave foranea hacia stg_users."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
              config:
                severity: warn
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_games')
                field: game_id
              config:
                severity: warn
      - name: STATUS
        description: "Estado del juego en la coleccion. Valores: Owned, Played, Wishlist, Trading."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Owned', 'Played', 'Wishlist', 'Trading']
      - name: ADDED_AT
        description: "Fecha en que el usuario aniadio el juego a su coleccion."
        data_tests:
          - not_null
      - name: NUM_PLAYS
        description: "Numero de partidas jugadas. Nulos reemplazados por 0."
        