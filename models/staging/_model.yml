version: 2

models:
  - name: stg_categories
    description: "Tabla de staging de categorias. Limpia y normalizada a partir de raw_categories."
    columns:
      - name: CATEGORY_ID
        description: "Clave primaria de la categoria. Formato CAT-XXX."
        tests:
          - unique
          - not_null
      - name: CATEGORY_NAME
        description: "Nombre de la categoria normalizado con INITCAP y TRIM."
        tests:
          - not_null
      - name: DESCRIPTION
        description: "Descripcion de la categoria con espacios eliminados."

  - name: stg_mechanics
    description: "Tabla de staging de mecanicas de juego. Limpia y normalizada a partir de raw_mechanics."
    columns:
      - name: MECHANIC_ID
        description: "Clave primaria de la mecanica. Formato MEC-XXX."
        tests:
          - unique
          - not_null
      - name: MECHANIC_NAME
        description: "Nombre de la mecanica normalizado con INITCAP y TRIM."
        tests:
          - not_null
      - name: DESCRIPTION
        description: "Descripcion de la mecanica con espacios eliminados."

  - name: stg_publishers
    description: "Tabla de staging de editoriales. Limpia y normalizada a partir de raw_publishers."
    columns:
      - name: PUBLISHER_ID
        description: "Clave primaria de la editorial. Formato PUB-XXX."
        tests:
          - unique
          - not_null
      - name: PUBLISHER_NAME
        description: "Nombre de la editorial normalizado con TRIM."
        tests:
          - not_null
      - name: COUNTRY
        description: "Codigo de pais ISO 3166-1 alpha-2 normalizado a mayusculas."
      - name: FOUNDED_YEAR
        description: "Anio de fundacion de la editorial."
      - name: IS_ACTIVE
        description: "Indica si la editorial sigue activa."

  - name: stg_designers
    description: "Tabla de staging de disenadores. Limpia y normalizada a partir de raw_designers."
    columns:
      - name: DESIGNER_ID
        description: "Clave primaria del disenador. Formato DES-XXX."
        tests:
          - unique
          - not_null
      - name: DESIGNER_NAME
        description: "Nombre del disenador normalizado con INITCAP y TRIM."
        tests:
          - not_null
      - name: NATIONALITY
        description: "Codigo de pais ISO 3166-1 alpha-2 normalizado a mayusculas."
      - name: BIRTH_YEAR
        description: "Anio de nacimiento del disenador."

  - name: stg_games
    description: "Tabla de staging del catalogo de juegos. Limpia y normalizada a partir de raw_games. Incluye columnas derivadas avg_playtime y complexity_bucket."
    columns:
      - name: GAME_ID
        description: "Clave primaria del juego. Formato GAME-XXXX."
        tests:
          - unique
          - not_null
      - name: TITLE
        description: "Titulo del juego normalizado con INITCAP y TRIM."
        tests:
          - not_null
      - name: YEAR_PUBLISHED
        description: "Anio de publicacion del juego."
      - name: LANGUAGE_DEPENDENCE
        description: "Nivel de dependencia del idioma. Valores validos: NONE, LOW, ENG."
        tests:
          - not_null
          - accepted_values:
              arguments: ['NONE', 'LOW', 'ENG']
      - name: MIN_PLAYERS
        description: "Numero minimo de jugadores. Garantizado menor o igual que max_players."
        tests:
          - not_null
      - name: MAX_PLAYERS
        description: "Numero maximo de jugadores."
        tests:
          - not_null
      - name: MIN_PLAYTIME
        description: "Duracion minima de la partida en minutos."
      - name: MAX_PLAYTIME
        description: "Duracion maxima de la partida en minutos."
      - name: MIN_AGE
        description: "Edad minima recomendada para jugar."
      - name: COMPLEXITY_WEIGHT
        description: "Peso de complejidad en escala 1.0-5.0."
        tests:
          - not_null
      - name: PUBLISHER_ID
        description: "Clave foranea hacia stg_publishers."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_publishers')
              column_name: PUBLISHER_ID
      - name: DESIGNER_ID
        description: "Clave foranea hacia stg_designers."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_designers')
              column_name: DESIGNER_ID
      - name: BGG_RANK
        description: "Ranking del juego en BoardGameGeek."
      - name: AVG_PLAYTIME
        description: "Columna derivada. Media aritmetica de min_playtime y max_playtime."
        tests:
          - not_null
      - name: COMPLEXITY_BUCKET
        description: "Columna derivada. Segmento de complejidad: Light, Medium-Light, Medium-Heavy, Heavy."
        tests:
          - not_null
          - accepted_values:
              arguments: ['Light', 'Medium-Light', 'Medium-Heavy', 'Heavy']

  - name: stg_game_categories
    description: "Relacion N:M entre juegos y categorias. Generada via SPLIT_TO_TABLE sobre raw_games.categories."
    columns:
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_games')
              column_name: GAME_ID
      - name: CATEGORY_ID
        description: "Clave foranea hacia stg_categories."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_categories')
              column_name: CATEGORY_ID

  - name: stg_game_mechanics
    description: "Relacion N:M entre juegos y mecanicas. Generada via SPLIT_TO_TABLE sobre raw_games.mechanics."
    columns:
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_games')
              column_name: GAME_ID
      - name: MECHANIC_ID
        description: "Clave foranea hacia stg_mechanics."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_mechanics')
              column_name: MECHANIC_ID

  - name: stg_users
    description: "Tabla de staging de usuarios. Limpia y normalizada a partir de raw_users."
    columns:
      - name: USER_ID
        description: "Clave primaria del usuario. Formato USR-XXXX."
        tests:
          - unique
          - not_null
      - name: USERNAME
        description: "Nombre de usuario normalizado a minusculas y sin espacios extra."
        tests:
          - not_null
      - name: EMAIL
        description: "Direccion de email normalizada a minusculas."
      - name: COUNTRY
        description: "Codigo de pais ISO 3166-1 alpha-2 normalizado a mayusculas."
      - name: REGISTRATION_DATE
        description: "Fecha de registro del usuario normalizada a tipo DATE."
        tests:
          - not_null
      - name: USER_TYPE
        description: "Tipo de usuario normalizado a minusculas."
        tests:
          - not_null
          - accepted_values:
              arguments: ['casual', 'enthusiast', 'collector']

  - name: stg_reviews
    description: "Tabla de staging de resenias. Validada y deduplicada a partir de raw_reviews. Una resenia por usuario y juego."
    columns:
      - name: REVIEW_ID
        description: "Clave primaria de la resenia. Formato REV-XXXXX."
        tests:
          - unique
          - not_null
      - name: USER_ID
        description: "Clave foranea hacia stg_users."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_users')
              column_name: USER_ID
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_games')
              column_name: GAME_ID
      - name: RATING
        description: "Valoracion numerica del juego en escala 1.0-10.0."
        tests:
          - not_null
      - name: REVIEW_TEXT
        description: "Texto de la resenia con espacios extra eliminados."
      - name: REVIEW_DATE
        description: "Fecha de publicacion de la resenia normalizada a tipo DATE."
        tests:
          - not_null
      - name: HELPFUL_VOTES
        description: "Numero de votos de utilidad recibidos por la resenia."
      - name: REVIEW_LENGTH_CHARS
        description: "Columna derivada. Longitud en caracteres del texto de la resenia."

  - name: stg_collections
    description: "Tabla de staging de colecciones. Limpia y deduplicada a partir de raw_collections. Una entrada por usuario y juego."
    columns:
      - name: COLLECTION_ID
        description: "Clave primaria de la entrada de coleccion. Formato COL-XXXXX."
        tests:
          - unique
          - not_null
      - name: USER_ID
        description: "Clave foranea hacia stg_users."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_users')
              column_name: USER_ID
      - name: GAME_ID
        description: "Clave foranea hacia stg_games."
        tests:
          - not_null
          - relationships:
              arguments: ref('stg_games')
              column_name: GAME_ID
      - name: STATUS
        description: "Estado del juego en la coleccion normalizado a minusculas."
        tests:
          - not_null
          - accepted_values:
              arguments: ['owned', 'wishlist', 'played', 'trading']
      - name: ADDED_AT
        description: "Fecha en que el usuario aniadio el juego a su coleccion."
        tests:
          - not_null
      - name: NUM_PLAYS
        description: "Numero de partidas jugadas. Nulos tratados como 0 mediante COALESCE."
        tests:
          - not_null