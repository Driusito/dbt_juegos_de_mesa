version: 2

models:
  - name: dim_date
    description: "Dimension de fechas. Permite analisis temporales por dia, semana, mes, trimestre y anio."
    columns:
      - name: DATE_SK
        description: "Clave subrogada de la fecha en formato numerico YYYYMMDD."
        tests:
          - unique
          - not_null
      - name: DATE
        description: "Fecha en tipo DATE."
        tests:
          - unique
          - not_null
      - name: YEAR
        description: "Anio de la fecha."
        tests:
          - not_null
      - name: QUARTER
        description: "Trimestre de la fecha en formato Q1, Q2, Q3, Q4."
        tests:
          - not_null
          - accepted_values:
              arguments: ['Q1', 'Q2', 'Q3', 'Q4']
      - name: MONTH_NUMBER
        description: "Numero del mes (1-12)."
        tests:
          - not_null
      - name: MONTH_NAME
        description: "Nombre del mes en ingles."
        tests:
          - not_null
      - name: WEEK_OF_YEAR
        description: "Numero de semana dentro del anio (1-53)."
      - name: DAY_OF_WEEK
        description: "Nombre del dia de la semana en ingles."
      - name: IS_WEEKEND
        description: "TRUE si la fecha corresponde a sabado o domingo."
        tests:
          - not_null

  - name: dim_game
    description: "Dimension de juegos. Enriquecida con publisher, designer y logica de negocio como complexity_bucket y avg_playtime."
    columns:
      - name: GAME_SK
        description: "Clave subrogada del juego generada con md5 sobre game_id."
        tests:
          - unique
          - not_null
      - name: GAME_ID
        description: "Clave natural del juego. Formato GAME-XXXX."
        tests:
          - unique
          - not_null
      - name: TITLE
        description: "Titulo del juego."
        tests:
          - not_null
      - name: YEAR_PUBLISHED
        description: "Anio de publicacion del juego."
      - name: LANGUAGE_DEPENDENCE
        description: "Nivel de dependencia del idioma: NONE, LOW, ENG."
        tests:
          - accepted_values:
              arguments: ['NONE', 'LOW', 'ENG']
      - name: MIN_PLAYERS
        description: "Numero minimo de jugadores."
      - name: MAX_PLAYERS
        description: "Numero maximo de jugadores."
      - name: MIN_PLAYTIME
        description: "Duracion minima de la partida en minutos."
      - name: MAX_PLAYTIME
        description: "Duracion maxima de la partida en minutos."
      - name: MIN_AGE
        description: "Edad minima recomendada."
      - name: COMPLEXITY_WEIGHT
        description: "Peso de complejidad en escala 1.0-5.0."
      - name: BGG_RANK
        description: "Ranking del juego en BoardGameGeek."
      - name: AVG_PLAYTIME
        description: "Duracion media de la partida en minutos. Calculada como (min_playtime + max_playtime) / 2."
        tests:
          - not_null
      - name: COMPLEXITY_BUCKET
        description: "Segmento de complejidad: Light, Medium-Light, Medium-Heavy, Heavy."
        tests:
          - not_null
          - accepted_values:
              arguments: ['Light', 'Medium-Light', 'Medium-Heavy', 'Heavy']
      - name: PUBLISHER_NAME
        description: "Nombre de la editorial desnormalizado desde stg_publishers."
      - name: PUBLISHER_COUNTRY
        description: "Pais de la editorial desnormalizado desde stg_publishers."
      - name: DESIGNER_NAME
        description: "Nombre del disenador desnormalizado desde stg_designers."
      - name: DESIGNER_NATIONALITY
        description: "Nacionalidad del disenador desnormalizado desde stg_designers."

  - name: dim_user
    description: "Dimension de usuarios con SCD Type 2. Mantiene historial de cambios en user_type."
    columns:
      - name: USER_SK
        description: "Clave subrogada del usuario. Distinta por cada version del registro."
        tests:
          - unique
          - not_null
      - name: USER_ID
        description: "Clave natural del usuario. Formato USR-XXXX. Puede aparecer en multiples filas."
        tests:
          - not_null
      - name: USERNAME
        description: "Nombre de usuario en la plataforma."
        tests:
          - not_null
      - name: EMAIL
        description: "Direccion de email del usuario."
      - name: COUNTRY
        description: "Codigo de pais del usuario."
      - name: USER_TYPE
        description: "Tipo de usuario en el periodo de vigencia: casual, enthusiast, collector."
        tests:
          - not_null
          - accepted_values:
              arguments: ['casual', 'enthusiast', 'collector']
      - name: VALID_FROM
        description: "Fecha de inicio de vigencia de esta version del registro."
        tests:
          - not_null
      - name: VALID_TO
        description: "Fecha de fin de vigencia. 9999-12-31 indica registro actualmente vigente."
        tests:
          - not_null
      - name: IS_CURRENT
        description: "TRUE si esta es la version actualmente vigente del usuario."
        tests:
          - not_null

  - name: fct_reviews
    description: "Tabla de hechos de resenias. Grain: una fila por resenia. Materializada como incremental."
    columns:
      - name: REVIEW_SK
        description: "Clave subrogada de la resenia generada con md5 sobre review_id."
        tests:
          - unique
          - not_null
      - name: USER_SK
        description: "Clave subrogada hacia dim_user."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_user')
              column_name: USER_SK
      - name: GAME_SK
        description: "Clave subrogada hacia dim_game."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_game')
              column_name: GAME_SK
      - name: DATE_SK
        description: "Clave subrogada hacia dim_date en formato YYYYMMDD."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_date')
              column_name: DATE_SK
      - name: RATING
        description: "Metrica. Valoracion numerica del juego en escala 1.0-10.0."
        tests:
          - not_null
      - name: HELPFUL_VOTES
        description: "Metrica. Numero de votos de utilidad recibidos por la resenia."
        tests:
          - not_null
      - name: REVIEW_LENGTH_CHARS
        description: "Metrica. Longitud en caracteres del texto de la resenia."
        tests:
          - not_null
      - name: REVIEW_DATE
        description: "Fecha de publicacion de la resenia."
        tests:
          - not_null
      - name: _LOADED_AT
        description: "Timestamp de carga en Bronze. Usado como watermark para la incremental."

  - name: fct_collections
    description: "Tabla de hechos de colecciones. Grain: una fila por entrada de coleccion de usuario."
    columns:
      - name: COLLECTION_SK
        description: "Clave subrogada de la entrada de coleccion generada con md5 sobre collection_id."
        tests:
          - unique
          - not_null
      - name: USER_SK
        description: "Clave subrogada hacia dim_user."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_user')
              column_name: USER_SK
      - name: GAME_SK
        description: "Clave subrogada hacia dim_game."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_game')
              column_name: GAME_SK
      - name: DATE_SK
        description: "Clave subrogada hacia dim_date en formato YYYYMMDD."
        tests:
          - not_null
          - relationships:
              arguments: ref('dim_date')
              column_name: DATE_SK
      - name: STATUS
        description: "Estado del juego en la coleccion: Owned, Played, Wishlist, Trading."
        tests:
          - not_null
          - accepted_values:
              arguments: ['Owned', 'Played', 'Wishlist', 'Trading']
      - name: NUM_PLAYS
        description: "Metrica. Numero de partidas jugadas por el usuario."
        tests:
          - not_null
      - name: ADDED_AT
        description: "Fecha en que el usuario aniadio el juego a su coleccion."
        tests:
          - not_null