version: 2

models:
  - name: dim_date
    description: "Dimension de fechas. Permite analisis temporales por dia, semana, mes, trimestre y anio."
    columns:
      - name: DATE_SK
        description: "Clave subrogada de la fecha en formato numerico YYYYMMDD."
        data_tests:
          - unique
          - not_null
      - name: DATE
        description: "Fecha en tipo DATE."
        data_tests:
          - unique
          - not_null
      - name: YEAR
        description: "Anio de la fecha."
        data_tests:
          - not_null
      - name: QUARTER
        description: "Trimestre de la fecha en formato Q1, Q2, Q3, Q4."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Q1', 'Q2', 'Q3', 'Q4']
      - name: MONTH_NUMBER
        description: "Numero del mes (1-12)."
        data_tests:
          - not_null
      - name: MONTH_NAME
        description: "Nombre del mes en ingles."
        data_tests:
          - not_null
      - name: WEEK_OF_YEAR
        description: "Numero de semana dentro del anio (1-53)."
      - name: DAY_OF_WEEK
        description: "Nombre del dia de la semana en ingles."
      - name: IS_WEEKEND
        description: "TRUE si la fecha corresponde a sabado o domingo."
        data_tests:
          - not_null

  - name: dim_game
    description: "Dimension de juegos. Enriquecida con publisher, designer, paises y logica de negocio como complexity_bucket y avg_playtime."
    columns:
      - name: GAME_SK
        description: "Clave subrogada del juego generada con md5 sobre game_id."
        data_tests:
          - unique
          - not_null
      - name: GAME_ID
        description: "Clave natural del juego. Formato GAME-XXXX."
        data_tests:
          - unique
          - not_null
      - name: TITLE
        description: "Titulo del juego."
        data_tests:
          - not_null
      - name: YEAR_PUBLISHED
        description: "Anio de publicacion del juego."
      - name: LANGUAGE_DEPENDENCE
        description: "Nivel de dependencia del idioma: NONE, LOW, ENG."
        data_tests:
          - accepted_values:
              arguments:
                values: ['NONE', 'LOW', 'ENG']
      - name: MIN_PLAYERS
        description: "Numero minimo de jugadores."
      - name: MAX_PLAYERS
        description: "Numero maximo de jugadores."
      - name: MIN_PLAYTIME
        description: "Duracion minima de la partida en minutos."
      - name: MAX_PLAYTIME
        description: "Duracion maxima de la partida en minutos."
      - name: MIN_AGE
        description: "Edad minima recomendada."
      - name: COMPLEXITY_WEIGHT
        description: "Peso de complejidad en escala 1.0-5.0."
      - name: BGG_RANK
        description: "Ranking del juego en BoardGameGeek."
      - name: AVG_PLAYTIME
        description: "Duracion media de la partida en minutos. Calculada como (min_playtime + max_playtime) / 2. Si la duracion minima es nula, la media es la duraccion maxima"
        data_tests:
          - not_null
      - name: COMPLEXITY_BUCKET
        description: "Segmento de complejidad: Light, Medium-Light, Medium-Heavy, Heavy."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Light', 'Medium-Light', 'Medium-Heavy', 'Heavy']
      - name: PUBLISHER_NAME
        description: "Nombre de la editorial desnormalizado desde stg_publishers."
      - name: PUBLISHER_COUNTRY_CODE
        description: "Codigo de pais ISO de la editorial."
      - name: PUBLISHER_COUNTRY_NAME
        description: "Nombre completo del pais de la editorial enriquecido desde el seed country_codes."
      - name: PUBLISHER_CONTINENT
        description: "Continente de la editorial enriquecido desde el seed country_codes."
      - name: DESIGNER_NAME
        description: "Nombre del disenador desnormalizado desde stg_designers."
      - name: DESIGNER_NATIONALITY_CODE
        description: "Codigo de nacionalidad ISO del disenador."
      - name: DESIGNER_COUNTRY_NAME
        description: "Nombre completo del pais del disenador enriquecido desde el seed country_codes."
      - name: DESIGNER_CONTINENT
        description: "Continente del disenador enriquecido desde el seed country_codes."

  - name: dim_user
    description: "Dimension de usuarios tipo 1: una fila por usuario (version actual)."
    columns:
      - name: USER_SK
        description: "Clave subrogada del usuario generada con md5(user_id)."
        data_tests:
          - unique
          - not_null

      - name: USER_ID
        description: "Clave natural del usuario."
        data_tests:
          - not_null

      - name: USERNAME
        description: "Nombre de usuario."
        data_tests:
          - not_null

      - name: EMAIL
        description: "Email del usuario."

      - name: COUNTRY_CODE
        description: "Codigo de pais ISO."

      - name: COUNTRY_NAME
        description: "Nombre del pais."

      - name: CONTINENT
        description: "Continente."

      - name: USER_TYPE
        description: "Tipo de usuario."
        data_tests:
          - accepted_values:
              arguments:
                values: ['casual', 'enthusiast', 'collector']

      - name: VALID_FROM
        description: "Fecha desde la que esta version es vigente."
        data_tests:
          - not_null

      - name: IS_CURRENT
        description: "Siempre TRUE en este modelo."
        data_tests:
          - not_null


  - name: fct_reviews
    columns:
      - name: USER_SK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_user')
                field: USER_SK

      - name: USER_ID
        description: "Clave natural del usuario."

  - name: fct_collections
    columns:
      - name: USER_SK
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_user')
                field: USER_SK

      - name: USER_ID
        description: "Clave natural del usuario."